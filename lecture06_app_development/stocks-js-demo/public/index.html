<!DOCTYPE html>
<!--
  FRONTEND — STRUCTURE.

  Plain HTML, no framework. Two main sections:
    1. Portfolio panel — form to add a ticker, list of tickers
    2. Forecast panel — appears once you click a ticker; shows the chart
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stock Forecast — JS frontend</title>
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js from a CDN (line chart for the forecast) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <main>
    <header>
      <h1>📈 Stock forecast</h1>
      <p class="subtitle">JavaScript frontend · Python backend · yfinance + Prophet · SQLite portfolio</p>
    </header>

    <!-- ====== Portfolio panel ====== -->
    <section class="card">
      <h5>Your portfolio</h5>

      <form id="add-form">
        <input type="text" id="ticker-input"
               placeholder="Ticker (e.g. AAPL, MSFT, SAP.DE)"
               maxlength="20" required>
        <button type="submit">Add</button>
      </form>
      <div id="add-error" class="error hidden"></div>

      <ul id="portfolio-list"></ul>
      <p id="empty-message" class="muted">Add a ticker to get started.</p>
    </section>

    <!-- ====== Forecast panel — hidden until a ticker is selected ====== -->
    <section id="forecast-section" class="card hidden">
      <h2 id="forecast-title">Forecast</h2>
      <div id="forecast-status" class="muted">Loading…</div>

      <div id="forecast-stats" class="stats hidden">
        <div class="stat">
          <span class="stat-label">Latest price</span>
          <span class="stat-value" id="stat-latest">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Predicted in 30 days</span>
          <span class="stat-value" id="stat-predicted">—</span>
          <span class="stat-change" id="stat-change">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">80% confidence range</span>
          <span class="stat-value" id="stat-range">—</span>
        </div>
      </div>

      <div id="chart-wrap" class="hidden">
        <canvas id="forecast-chart"></canvas>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
